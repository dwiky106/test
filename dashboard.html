<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <button id="menuToggle">☰</button>
  <h1>Sekartaji Fisheries System</h1>
</header>

<!-- SIDEBAR -->
<nav id="sidebar" class="sidebar">
  <ul>
    <li data-section="dashboard">Dashboard Utama</li>
    <li data-section="pakan">Manajemen Pakan</li>
    <li data-section="recording">Recording Harian</li>
    <li data-section="lab">Labolatorium</li>
    <li data-section="laporan">Laporan</li>
  </ul>
</nav>

<!-- CONTENT -->
<main id="content">

  <!-- DASHBOARD -->
  <section id="dashboard" class="section active">
    <h2>Dashboard Utama</h2>
    <p>Ini adalah halaman utama monitoring.</p>
  </section>

  <!-- PAKAN -->
  <section id="pakan" class="section">
    <h2>Manajemen Pakan</h2>
  </section>

  <!-- RECORDING -->
  <section id="recording" class="section recording-section">

    <h2>Recording Harian</h2>

    <!-- SEARCH -->
    <input 
      type="text" 
      id="searchKolam" 
      placeholder="Cari nama kolam..." 
      class="search-input"
    />

    <!-- CONTAINER -->
    <div id="kolamContainer"></div>

    <!-- TAMBAH KOLAM -->
    <div class="tambah-kolam-box">
      <h3>Tambah Kolam</h3>
      <input type="text" id="namaKolam" placeholder="Nama Kolam">
      <input type="number" id="kapasitasKolam" placeholder="Kapasitas">
      <button onclick="submitKolam()">Tambah Kolam</button>
    </div>

  </section>

  <!-- LAB -->
  <section id="lab" class="section">
    <h2>Labolatorium</h2>
  </section>

  <!-- LAPORAN -->
  <section id="laporan" class="section">
    <h2>Laporan</h2>
  </section>

</main>

<!-- MODAL (PINDAH KE LUAR SECTION) -->
<div id="modalRecording" class="modal">
  <div class="modal-content">

    <h3 class="modal-title">Input Recording</h3>

    <div class="form-group">
      <label>Suhu (°C)</label>
      <input type="number" id="inputSuhu" placeholder="Contoh: 30">
    </div>

    <div class="form-group">
      <label>DO Air</label>
      <input type="number" id="inputDo" placeholder="Contoh: 5">
    </div>

    <div class="form-group">
      <label>PH Air</label>
      <input type="number" id="inputPh" placeholder="Contoh: 7">
    </div>

    <div class="form-group">
      <label>Jumlah Ikan Mati</label>
      <input type="number" id="inputKematian" placeholder="Contoh: 2">
    </div>

    <div class="form-group">
      <label>Jenis Pakan</label>
      <select id="jenisPakan">
  <option value="">Pilih Jenis Pakan</option>
  <option value="PF 1000">PF 1000</option>
  <option value="PF 800">PF 800</option>
  <option value="PF 781-1">PF 781-1</option>
  <option value="PF 781-2">PF 781-2</option>
  <option value="PF 781">PF 781</option>
  <option value="PF 782">PF 782</option>
  <option value="PF 1000 S">PF 1000 S</option>
  <option value="PF 800 S">PF 800 S</option>
  <option value="Hi-Pro-Vite 781">Hi-Pro-Vite 781</option>
  <option value="Hi-Pro-Vite 782">Hi-Pro-Vite 782</option>
  <option value="Hi-Pro-Vite 783">Hi-Pro-Vite 783</option>
  <option value="Hi-Pro-Vite 784">Hi-Pro-Vite 784</option>
  <option value="Hi-Pro-Vite 785">Hi-Pro-Vite 785</option>
</select>
    </div>

    <div class="form-group">
      <label>Jumlah Pakan (gram)</label>
      <input type="number" id="inputPakan" placeholder="Contoh: 3">
    </div>

    <div class="modal-actions">
      <button id="submitRecording" class="btn-primary">Simpan</button>
      <button onclick="closeModal()" class="btn-secondary">Tutup</button>
    </div>

  </div>
</div>
<div id="modalEdit" class="modal">
  <div class="modal-content edit-modal">

    <h3 class="modal-title">Edit Kolam</h3>

    <div class="form-group">
      <label>Nama Kolam</label>
      <input type="text" id="editNama" class="input">
    </div>

    <div class="form-group">
      <label>Kapasitas Tebar</label>
      <input type="number" id="editKapasitas" class="input">
    </div>

    <div class="form-group">
      <label>Status Kolam</label>
      <select id="editStatus" class="input">
        <option value="aktif">Aktif</option>
        <option value="off">Nonaktif</option>
      </select>
    </div>

    <div class="btn-group">
      <button class="btn-primary" onclick="submitEdit()">💾 Simpan</button>
      <button class="btn-secondary" onclick="closeEdit()">Tutup</button>
    </div>

  </div>
</div>
</div>
<!-- 🔥 TAMBAHKAN DI SINI -->
<div id="modalPrint" class="modal">
  <div class="modal-content print-modal">

    <h3 class="modal-title">Cetak Recording</h3>

    <div class="form-group">
      <label>Pilih Jenis Cetak</label>
      <select id="printType" class="input">
        <option value="today">Hari Ini</option>
        <option value="range">Rentang Tanggal</option>
      </select>
    </div>

    <div id="rangeBox" class="range-box">
      <div class="form-group">
        <label>Tanggal Mulai</label>
        <input type="date" id="printStart" class="input">
      </div>

      <div class="form-group">
        <label>Tanggal Akhir</label>
        <input type="date" id="printEnd" class="input">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn-primary" onclick="cetakData()">Cetak</button>
      <button class="btn-secondary" onclick="closePrint()">Tutup</button>
    </div>

  </div>
<div id="loadingOverlay"></div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
